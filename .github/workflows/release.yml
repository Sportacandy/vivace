name: Release

# Triggered by pushing a version tag (git tag v0.1.1 && git push origin v0.1.1).
# Builds the NSIS installer and publishes it as a release asset automatically
# -- going forward this replaces the manual `gh release create` step.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.11.1'
          arch: 'win64_msvc2022_64'
          modules: 'qtmultimedia qtshadertools'
          # See build.yml for why this is needed: aqtinstall's last PyPI
          # release (3.3.0) predates Qt 6.11's repository restructuring.
          aqtsource: 'git+https://github.com/miurahr/aqtinstall.git@8c3695d4a4e1ceabf6a74dc6c79681656dc6b74b'        

      - name: Swap in the patched qtmultimedia AV1 + Speed Control fix (prebuilt)
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/Sportacandy/vivace/releases/download/qt-patched-prebuilt-win64/qt-patched-prebuilt-win64.zip" -OutFile qt-av1-prebuilt.zip
          Expand-Archive -Path qt-av1-prebuilt.zip -DestinationPath qt-av1-prebuilt
          Copy-Item qt-av1-prebuilt\ffmpegmediaplugin.dll "$env:QT_ROOT_DIR\plugins\multimedia\ffmpegmediaplugin.dll" -Force
          foreach ($dll in "avcodec-61.dll","avformat-61.dll","avutil-59.dll","swresample-5.dll","swscale-8.dll") {
            Copy-Item "qt-av1-prebuilt\$dll" "$env:QT_ROOT_DIR\bin\$dll" -Force
          }
          
      - name: Install NSIS
        shell: pwsh
        run: |
          for ($i = 1; $i -le 3; $i++) {
            choco install nsis -y
            if ($LASTEXITCODE -eq 0) { exit 0 }
            Write-Host "choco install nsis failed (attempt $i), retrying in 30s..."
            Start-Sleep -Seconds 30
          }
          exit 1

      - name: Build installer
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          packaging/windows/build_installer.ps1 -QtDir "$env:QT_ROOT_DIR" -Version $version

      - name: Extract changelog notes for this version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $changelog = Get-Content CHANGELOG.md -Raw
          $pattern = "(?ms)^## \[$([regex]::Escape($version))\].*?(?=^## \[|\z)"
          $match = [regex]::Match($changelog, $pattern)
          if ($match.Success) {
            $match.Value.TrimEnd() | Set-Content -Path release_notes.md -NoNewline
          } else {
            Write-Host "No CHANGELOG.md section found for $version; release will have no notes."
            "" | Set-Content -Path release_notes.md -NoNewline
          }

      - name: Upload installer to release
        uses: softprops/action-gh-release@v2
        with:
          files: VivaceSetup-Release.exe
          body_path: release_notes.md

  build-and-release-linux:
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libxkbcommon-dev patchelf

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.11.1'
          arch: 'linux_gcc_64'
          modules: 'qtmultimedia qtshadertools'
          aqtsource: 'git+https://github.com/miurahr/aqtinstall.git@8c3695d4a4e1ceabf6a74dc6c79681656dc6b74b'

      - name: Swap in an AV1-capable FFmpeg (official Qt's bundle lacks libdav1d)
        run: |
          curl -L -o ffmpeg-av1.tar.xz "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n7.1-latest-linux64-gpl-shared-7.1.tar.xz"
          mkdir ffmpeg-av1
          tar -xJf ffmpeg-av1.tar.xz -C ffmpeg-av1 --strip-components=1
          for so in libavcodec.so.61 libavformat.so.61 libavutil.so.59 libswresample.so.5 libswscale.so.8; do
            cp "ffmpeg-av1/lib/$so" "$QT_ROOT_DIR/lib/$so"
          done

      - name: Build tarball
        run: |
          chmod +x packaging/linux/build_installer.sh
          QT_DIR="$QT_ROOT_DIR" packaging/linux/build_installer.sh --tarball

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: Vivace-linux-x86_64.tar.gz

  build-and-release-macos:
    needs: build-and-release
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.11.1'
          arch: 'clang_64'
          modules: 'qtmultimedia qtshadertools'

      - name: Swap in an AV1-capable FFmpeg (official Qt's bundle lacks libdav1d)
        run: |
          brew install ffmpeg@7
          FFMPEG7=$(brew --prefix ffmpeg@7)
          for dylib in libavcodec.61.dylib libavformat.61.dylib libavutil.59.dylib libswresample.5.dylib libswscale.8.dylib; do
            cp "$FFMPEG7/lib/$dylib" "$QT_ROOT_DIR/lib/$dylib"
          done

      - name: Build dmg
        run: |
          chmod +x packaging/macos/build_installer.sh
          QT_DIR="$QT_ROOT_DIR" packaging/macos/build_installer.sh --dmg

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: Vivace-macos.dmg
