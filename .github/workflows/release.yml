name: Release

# Triggered by pushing a version tag (git tag v0.1.1 && git push origin v0.1.1).
# Builds the NSIS installer and publishes it as a release asset automatically
# -- going forward this replaces the manual `gh release create` step.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.11.1'
          arch: 'win64_msvc2022_64'
          modules: 'qtmultimedia qtshadertools'

      - name: Swap in an AV1-capable FFmpeg (official Qt's bundle lacks libdav1d)
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n7.1-latest-win64-gpl-shared-7.1.zip" -OutFile ffmpeg-av1.zip
          Expand-Archive -Path ffmpeg-av1.zip -DestinationPath ffmpeg-av1
          $src = Get-ChildItem -Path ffmpeg-av1 -Directory | Select-Object -First 1
          foreach ($dll in "avcodec-61.dll","avformat-61.dll","avutil-59.dll","swresample-5.dll","swscale-8.dll") {
            Copy-Item "$($src.FullName)\bin\$dll" "$env:QT_ROOT_DIR\bin\$dll" -Force
          }

      - name: Install NSIS
        shell: pwsh
        run: |
          for ($i = 1; $i -le 3; $i++) {
            choco install nsis -y
            if ($LASTEXITCODE -eq 0) { exit 0 }
            Write-Host "choco install nsis failed (attempt $i), retrying in 30s..."
            Start-Sleep -Seconds 30
          }
          exit 1

      - name: Build installer
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          packaging/windows/build_installer.ps1 -QtDir "$env:QT_ROOT_DIR" -Version $version

      - name: Upload installer to release
        uses: softprops/action-gh-release@v2
        with:
          files: VivaceSetup-Release.exe
  build-and-release-linux:
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libxkbcommon-dev patchelf

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.11.1'
          arch: 'linux_gcc_64'
          modules: 'qtmultimedia qtshadertools'
          aqtsource: 'git+https://github.com/miurahr/aqtinstall.git@8c3695d4a4e1ceabf6a74dc6c79681656dc6b74b'

      - name: Build tarball
        run: |
          chmod +x packaging/linux/build_installer.sh
          QT_DIR="$QT_ROOT_DIR" packaging/linux/build_installer.sh --tarball

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: Vivace-linux-x86_64.tar.gz

  build-and-release-macos:
    needs: build-and-release
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.11.1'
          arch: 'clang_64'
          modules: 'qtmultimedia qtshadertools'

      - name: Build dmg
        run: |
          chmod +x packaging/macos/build_installer.sh
          QT_DIR="$QT_ROOT_DIR" packaging/macos/build_installer.sh --dmg

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: Vivace-macos.dmg
