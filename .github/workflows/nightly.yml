name: Nightly

# Rebuilds a single rolling "nightly" pre-release on every push to main, so
# users can grab the latest build between version tags. See release.yml for
# the tag-triggered permanent releases.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.11.1'
          arch: 'win64_msvc2022_64'
          modules: 'qtmultimedia qtshadertools'
          # See build.yml for why this is needed: aqtinstall's last PyPI
          # release (3.3.0) predates Qt 6.11's repository restructuring.
          aqtsource: 'git+https://github.com/miurahr/aqtinstall.git@8c3695d4a4e1ceabf6a74dc6c79681656dc6b74b'

      - name: Install NSIS
        shell: pwsh
        run: |
          for ($i = 1; $i -le 3; $i++) {
            choco install nsis -y
            if ($LASTEXITCODE -eq 0) { exit 0 }
            Write-Host "choco install nsis failed (attempt $i), retrying in 30s..."
            Start-Sleep -Seconds 30
          }
          exit 1

      - name: Build installer
        shell: pwsh
        run: packaging/windows/build_installer.ps1 -QtDir "$env:QT_ROOT_DIR"

      - name: Rename installer
        shell: pwsh
        run: Rename-Item VivaceSetup-Release.exe VivaceSetup-Nightly.exe

      - name: Update nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly build
          target_commitish: ${{ github.sha }}
          prerelease: true
          make_latest: false
          body: |
            Automatic build from the latest `main` commit (${{ github.sha }}).
            May be unstable — prefer a tagged release for daily use.
          files: VivaceSetup-Nightly.exe

  build-and-release-linux:
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libxkbcommon-dev patchelf

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.11.1'
          arch: 'linux_gcc_64'
          modules: 'qtmultimedia qtshadertools'
          aqtsource: 'git+https://github.com/miurahr/aqtinstall.git@8c3695d4a4e1ceabf6a74dc6c79681656dc6b74b'

      - name: Build tarball
        run: |
          chmod +x packaging/linux/build_installer.sh
          QT_DIR="$QT_ROOT_DIR" packaging/linux/build_installer.sh --tarball

      - name: Update nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          prerelease: true
          make_latest: false
          files: Vivace-linux-x86_64.tar.gz

  build-and-release-macos:
    needs: build-and-release
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.11.1'
          arch: 'clang_64'
          modules: 'qtmultimedia qtshadertools'

      - name: Build dmg
        run: |
          chmod +x packaging/macos/build_installer.sh
          QT_DIR="$QT_ROOT_DIR" packaging/macos/build_installer.sh --dmg

      - name: Update nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          prerelease: true
          make_latest: false
          files: Vivace-macos.dmg
