name: Build

# Fast feedback: configure + build only, no packaging, across all three
# target platforms. Runs on every push/PR to main; see release.yml for the
# tag-triggered Windows installer build.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            qt-arch: win64_msvc2022_64
          - os: ubuntu-latest
            qt-arch: linux_gcc_64
          - os: macos-latest
            qt-arch: clang_64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libxkbcommon-dev patchelf

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.11.1'
          arch: ${{ matrix.qt-arch }}
          modules: 'qtmultimedia qtshadertools'
          # aqtinstall's last PyPI release (3.3.0) predates Qt 6.11's repository
          # restructuring (per-toolchain top-level dirs on Windows, modules moved
          # under an "addons." package namespace) -- see aqtinstall#959, fixed by
          # aqtinstall PR#1000 (merged, not yet tagged/released to PyPI). Install
          # aqtinstall from that merge commit until a release picks it up.
          aqtsource: 'git+https://github.com/miurahr/aqtinstall.git@8c3695d4a4e1ceabf6a74dc6c79681656dc6b74b'

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -B build -G "Visual Studio 18 2026" -A x64 -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR"

      - name: Configure (Linux/macOS)
        if: runner.os != 'Windows'
        run: cmake -B build -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"

      - name: Build
        run: cmake --build build --config Release --parallel
